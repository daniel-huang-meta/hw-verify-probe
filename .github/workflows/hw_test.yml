name: MacOS Hardware CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      target_runner:
        description: 'Select Runner'
        required: true
        default: 'MacBook-Pro'
        type: choice
        options:
          - MacBook-Pro

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.9.8"
        enable-cache: true
    - name: Set up Python
      run: uv python install

  hw-test:
    needs: build
    runs-on: [self-hosted, "${{ github.event.inputs.target_runner || 'macOS' }}"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        run: uv python install
      - name: Execute Test on Hardware
        run: |
          uv run --locked hw_test.py
